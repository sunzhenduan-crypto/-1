<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记账小程序网页版</title>
<style>
body {font-family: Arial; background:#f5f5f5; margin:0;}
.container {max-width:500px;margin:auto;padding:20px;}
.card {background:#fff;padding:15px;border-radius:12px;margin-bottom:15px;}
input {width:100%;padding:10px;margin-bottom:10px;border:1px solid #eee;}
button {width:100%;padding:10px;background:#07c160;color:#fff;border:none;border-radius:8px;}
.item {display:flex;justify-content:space-between;margin-top:10px;}
h2 {margin:0;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>总支出：￥<span id="total">0</span></h2>
</div>

<div class="card">
<input id="date" placeholder="日期">
<input id="category" placeholder="类别">
<input id="amount" type="number" placeholder="金额">
<button onclick="addBill()">添加账单</button>
</div>

<div id="list"></div>

</div>

<script>
let bills = JSON.parse(localStorage.getItem('bills') || '[]')

function save(){
localStorage.setItem('bills', JSON.stringify(bills))
}

function render(){
let list=document.getElementById('list')
list.innerHTML=''
let total=0

bills.forEach((b,i)=>{
total+=b.amount
list.innerHTML+=`
<div class="card item">
<span>${b.category} ￥${b.amount}</span>
<button onclick="del(${i})">删除</button>
</div>`
})

document.getElementById('total').innerText=total
}

function addBill(){
let date=document.getElementById('date').value
let category=document.getElementById('category').value
let amount=document.getElementById('amount').value

if(!date||!category||!amount){
alert('请填写完整');return;
}

bills.unshift({date,category,amount:Number(amount)})
save()
render()
}

function del(i){
bills.splice(i,1)
save()
render()
}

render()
</script>

</body>
</html>
